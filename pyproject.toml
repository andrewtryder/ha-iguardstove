[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--cov=custom_components/iguardstove --cov-report=term-missing"

[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "C4",     # flake8-comprehensions
    "B",      # flake8-bugbear
    "ASYNC",  # flake8-async
    "UP",     # pyupgrade
    "RUF",    # ruff-specific rules
    "SIM",    # flake8-simplify
    "PERF",   # perflint
    "FA",     # flake8-future-annotations
]
ignore = ["E501"]

[tool.ruff.lint.isort]
combine-as-imports = true

[tool.mypy]
python_version = "3.14"
strict = true
explicit_package_bases = true
show_error_codes = true
ignore_missing_imports = true
files = ["custom_components", "tests"]

[[tool.mypy.overrides]]
module = ["tests.*", "tests"]
ignore_errors = true
