name: Validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@083f2390f7797746fd86ecfaaa08796695627a85 # v0.8.0
        with:
          category: integration

  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Home Assistant Validation (hassfest)
        uses: home-assistant/actions/hassfest@c3e1e2d7e8b6b27e85c6978fb02998a442e973e5
