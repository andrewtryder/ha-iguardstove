name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Tests (Python 3.14)
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python 3.14
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements_test.txt -c constraints_test.txt

      - name: Verify Python syntax compilation
        run: python -m compileall custom_components tests

      - name: Run tests with coverage
        run: >
          pytest
          --cov=custom_components/iguardstove
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=95

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Run mypy strict type check
        run: mypy custom_components tests

  validate-hacs:
    runs-on: ubuntu-latest
    name: HACS validation
    steps:
      - name: HACS validation
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main
        with:
          category: integration

  validate-hassfest:
    runs-on: ubuntu-latest
    name: Hassfest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Home Assistant Validation (hassfest)
        uses: home-assistant/actions/hassfest@e3fb68ebda13d88a0d695082f471ba2c83d025fb # master

  ci-success:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    name: CI success
    needs: [tests, validate-hacs, validate-hassfest]
    steps:
      - name: All required checks passed
        run: echo "Tests, HACS, and Hassfest succeeded for ${{ github.sha }}"

  release-please:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Release Please
    needs: [ci-success]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
