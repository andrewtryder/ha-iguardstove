name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Tests (Python 3.14)
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python 3.14
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements_test.txt -c constraints_test.txt

      - name: Verify Python syntax compilation
        run: python -m compileall custom_components tests

      - name: Run tests with coverage
        run: >
          pytest
          --cov=custom_components/iguardstove
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=95

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .
